services:
  # ─────────────────────────────────────────────
  # EbiClaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm ebiclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  ebiclaw-agent:
    image: docker.io/n-seiji/ebiclaw:latest
    container_name: ebiclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.ebiclaw
    entrypoint: ["ebiclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # EbiClaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  ebiclaw-gateway:
    image: docker.io/n-seiji/ebiclaw:latest
    container_name: ebiclaw-gateway
    restart: unless-stopped
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.ebiclaw

  # ─────────────────────────────────────────────
  # EbiClaw Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  ebiclaw-launcher:
    image: docker.io/n-seiji/ebiclaw:launcher
    container_name: ebiclaw-launcher
    restart: unless-stopped
    profiles:
      - launcher
    environment:
      - EBICLAW_GATEWAY_HOST=0.0.0.0
      # Set a fixed dashboard token instead of a random one each restart.
      # If not set, a random token is generated and printed to the console on startup.
      #- EBICLAW_LAUNCHER_TOKEN=your-secret-token-here
    ports:
      - "18800:18800"
      - "18790:18790"
    volumes:
      - ./data:/root/.ebiclaw
