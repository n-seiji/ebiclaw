services:
  # ─────────────────────────────────────────────
  # EbiClaw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm ebiclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  ebiclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: ebiclaw-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.ebiclaw/config.json:ro
      - ebiclaw-workspace:/root/.ebiclaw/workspace
      - ebiclaw-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["ebiclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # EbiClaw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  ebiclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: ebiclaw-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.ebiclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - ebiclaw-workspace:/root/.ebiclaw/workspace
      # NPM cache for faster MCP server installs
      - ebiclaw-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  ebiclaw-workspace:
  ebiclaw-npm-cache: # Cache npm packages to speed up MCP server installations
